kind = "web"
previewPath = "/"
title = "APA Medical Assessment"
version = "1.0.0"
id = "artifacts/apa-medical"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20922

[services.development]
run = "pnpm --filter @workspace/apa-medical run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/apa-medical", "run", "build" ]
publicDir = "artifacts/apa-medical/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20922"
BASE_PATH = "/"
